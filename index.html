<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Aycel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#ffc0da,#ff9dc8,#ff87bc);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    padding:20px;
}

/* GLOW */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top,#ffffff55 0%,transparent 40%),
    radial-gradient(circle at bottom,#ff5ea866 0%,transparent 45%);
    z-index:0;
}

/* LOVE RAIN */
.love{
    position:absolute;
    top:-50px;
    color:#ff2f7d;
    animation:fall linear forwards;
    opacity:0.8;
    z-index:1;
    pointer-events:none;
}

@keyframes fall{
    0%{
        transform:translateY(-10vh) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:translateY(120vh) rotate(360deg);
        opacity:0;
    }
}

/* MAIN */
.container{
    position:relative;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* TITLE */
.text-top{
    font-size:52px;
    font-weight:600;
    color:white;
    margin-bottom:22px;
    letter-spacing:1px;
    text-shadow:
    0 0 10px rgba(255,255,255,0.7),
    0 0 25px rgba(255,105,180,0.5);
    text-align:center;
    padding:0 20px;
}

/* MAIL */
.mail{
    position:relative;
    width:340px;
    height:240px;
}

/* ENVELOPE */
.envelope{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,#ff8fc4,#ff69b4);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* FLAP */
.flap{
    position:absolute;
    width:100%;
    height:140px;
    background:#ff4f9f;
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top;
    transition:1s ease;
    z-index:5;
}

/* BUTTON */
.open-btn{
    position:absolute;
    top:95px;
    left:50%;
    transform:translateX(-50%);
    width:72px;
    height:72px;
    border-radius:50%;
    border:none;
    background:linear-gradient(180deg,#ff2f7d,#ff5ea8);
    color:white;
    font-size:32px;
    cursor:pointer;
    z-index:20;
    box-shadow:
    0 0 15px #ff5ea8,
    0 0 30px #ff5ea8;
    transition:0.3s;
}

.open-btn:hover{
    transform:translateX(-50%) scale(1.1);
}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:min(92%,850px);
    max-height:90vh;
    overflow-y:auto;
    background:rgba(255,255,255,0.96);
    backdrop-filter:blur(12px);
    border-radius:28px;
    padding:35px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
    transition:0.45s ease;
    z-index:100;
}

.popup.show{
    transform:translate(-50%,-50%) scale(1);
}

/* CLOSE */
.close{
    position:absolute;
    top:14px;
    right:22px;
    font-size:34px;
    color:#ff4f9f;
    cursor:pointer;
    font-weight:700;
}

/* CONTENT */
.popup-content{
    width:100%;
}

/* TITLE ROW */
.title-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    margin-bottom:20px;
}

/* TITLE */
.text-section h1{
    flex:1;
    font-size:50px;
    font-weight:700;
    color:#ff3f8e;
    line-height:1.1;
    letter-spacing:0.5px;
    text-shadow:0 2px 12px rgba(255,105,180,0.12);
}

/* MESSAGE */
.text-section p{
    font-size:16px;
    color:#555;
    line-height:1.9;
    font-weight:400;
    min-height:180px;
    white-space:pre-line;
}

/* TYPE CURSOR */
.typing::after{
    content:"|";
    animation:blink 0.7s infinite;
    color:#ff4f9f;
    margin-left:2px;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* IMAGE */
.popup-img{
    width:170px;
    max-width:35%;
    object-fit:contain;
    animation:floaty 3s ease-in-out infinite;
}

/* FLOAT */
@keyframes floaty{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* MOBILE */
@media(max-width:768px){

    body{
        padding:20px;
        overflow:hidden;
    }

    .text-top{
        font-size:34px;
    }

    .mail{
        width:290px;
        height:210px;
    }

    .popup{
        width:95%;
        padding:22px;
        border-radius:22px;
    }

    .title-row{
        flex-direction:column;
        text-align:center;
    }

    .text-section h1{
        font-size:32px;
    }

    .popup-img{
        width:150px;
        max-width:100%;
    }

    .text-section p{
        font-size:15px;
        line-height:1.8;
        min-height:220px;
    }

    .close{
        font-size:30px;
        top:10px;
        right:18px;
    }
}

</style>
</head>
<body>

<!-- MUSIC -->
<audio id="bgmusic" loop>
    <source src="bgmusic.mp3" type="audio/mpeg">
</audio>

<!-- LOVE RAIN -->
<div id="rain-container"></div>

<!-- MAIN -->
<div class="container">

    <div class="text-top">
        buka ini ya aycel ♡
    </div>

    <div class="mail">

        <div class="envelope">
            <div class="flap" id="flap"></div>
        </div>

        <button class="open-btn" id="openBtn">
            ♥
        </button>

    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">

    <div class="close" id="closeBtn">
        ×
    </div>

    <div class="popup-content">

        <div class="text-section">

            <div class="title-row">

                <h1>
                    Selamat Ulang Tahun Aycel
                </h1>

                <!-- GANTI DENGAN FOTO -->
                <img src="aycel.png" class="popup-img">

            </div>

            <p id="typingText"></p>

        </div>

    </div>

</div>

<script>

const flap = document.getElementById("flap");
const popup = document.getElementById("popup");
const openBtn = document.getElementById("openBtn");
const closeBtn = document.getElementById("closeBtn");
const music = document.getElementById("bgmusic");
const typingText = document.getElementById("typingText");

const message = `Aku berharap semua hal baik datang kepadamu:
kebahagiaan, kesehatan, mimpi yang tercapai,
dan hati yang selalu dipenuhi cinta.
Dan semoga, di setiap langkah hidupmu nanti,
banyak orang yang berdiri di sampingmu,
happy birthday ya aycellll .`;

/* OPEN */
openBtn.addEventListener("click", () => {

    flap.style.transform = "rotateX(180deg)";

    music.play();

    setTimeout(() => {

        popup.classList.add("show");

        typingText.innerHTML = "";
        typingText.classList.add("typing");

        let i = 0;

        function typeWriter(){

            if(i < message.length){

                typingText.innerHTML += message.charAt(i);

                i++;

                setTimeout(typeWriter,35);

            }else{

                typingText.classList.remove("typing");

            }
        }

        typeWriter();

    }, 700);

});

/* CLOSE */
closeBtn.addEventListener("click", () => {

    popup.classList.remove("show");

    flap.style.transform = "rotateX(0deg)";

});

/* LOVE RAIN */
const rainContainer = document.getElementById("rain-container");

function createLove(){

    const love = document.createElement("div");

    love.classList.add("love");

    love.innerHTML = ["❤","♡","💕","💖"][Math.floor(Math.random()*4)];

    love.style.left = Math.random() * window.innerWidth + "px";

    love.style.fontSize = (Math.random() * 20 + 15) + "px";

    love.style.animationDuration = (Math.random() * 4 + 3) + "s";

    rainContainer.appendChild(love);

    setTimeout(() => {
        love.remove();
    },7000);
}

setInterval(createLove,150);

</script>

</body>
</html>
